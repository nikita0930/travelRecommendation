<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelBloom - Contact Us</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      color: #ffffff;
    }

    .page {
      min-height: 100vh;
      background-image: linear-gradient(rgba(8, 29, 43, 0.45), rgba(8, 29, 43, 0.45)),
        url("https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background-color: rgba(11, 35, 49, 0.95);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 2rem;
      font-style: italic;
      font-weight: bold;
    }

    .brand a,
    .nav-links a,
    .social-links a {
      color: #ffffff;
      text-decoration: none;
    }

    .brand-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 2px solid #ffffff;
      border-radius: 4px;
      font-size: 1.1rem;
    }

    .nav-links {
      display: flex;
      gap: 28px;
    }

    .content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 36px;
      padding: 72px 40px;
    }

    .social-links {
      display: flex;
      flex-direction: column;
      gap: 18px;
      font-size: 1.4rem;
      padding-top: 90px;
    }

    .contact-copy {
      flex: 1;
      max-width: 520px;
    }

    .contact-copy h1 {
      font-size: 4rem;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .contact-copy p {
      font-size: 1.4rem;
    }

    .contact-form-wrap {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      background-color: rgba(5, 16, 26, 0.42);
    }

    form label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    form input,
    form textarea {
      width: 100%;
      margin-bottom: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 4px;
      background-color: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }

    form input::placeholder,
    form textarea::placeholder {
      color: rgba(255, 255, 255, 0.72);
    }

    form textarea {
      min-height: 120px;
      resize: vertical;
    }

    form button {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 4px;
      background-color: #169783;
      color: #ffffff;
      font-weight: bold;
      cursor: pointer;
    }

    @media (max-width: 900px) {
      nav {
        flex-direction: column;
        gap: 16px;
      }

      .content {
        flex-direction: column;
        align-items: flex-start;
        padding: 40px 24px;
      }

      .social-links {
        flex-direction: row;
        padding-top: 0;
      }

      .contact-copy h1 {
        font-size: 2.8rem;
      }

      .contact-form-wrap {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <section class="page">
    <nav>
      <div class="brand">
        <a class="brand-icon" href="travel_recommendation.html">TB</a>
        <a href="travel_recommendation.html">TravelBloom</a>
      </div>

      <div class="nav-links">
        <a href="travel_recommendation.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
      </div>
    </nav>

    <div class="content">
      <div class="social-links">
        <a href="#" aria-label="Twitter">T</a>
        <a href="#" aria-label="Facebook">f</a>
        <a href="#" aria-label="Instagram">I</a>
        <a href="#" aria-label="YouTube">YT</a>
      </div>

      <div class="contact-copy">
        <h1>Contact Us</h1>
        <p>Get in touch</p>
      </div>

      <div class="contact-form-wrap">
        <form action="#" method="post">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Enter your name">

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Enter your email">

          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Enter your message"></textarea>

          <button type="submit">Submit</button>
        </form>
      </div>
    </div>
  </section>
</body>
</html>
